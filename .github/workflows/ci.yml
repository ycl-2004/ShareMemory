name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Protocol lint self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax check
        run: bash -n templates/project/scripts/check_memory.sh

      - name: Blank templates pass lint
        run: |
          mkdir -p /tmp/proj/scripts
          cp -r templates/memory /tmp/proj/AI_MEMORY
          mkdir /tmp/proj/AI_MEMORY/archive
          cp templates/project/scripts/check_memory.sh /tmp/proj/scripts/
          sed -i 's/- Protocol: .*/- Protocol: v1.0/' /tmp/proj/AI_MEMORY/CONFIG.md
          bash /tmp/proj/scripts/check_memory.sh

      - name: Violations are caught
        run: |
          sed -i 's/- Protocol: v1.0/- Protocol: v0.9/' /tmp/proj/AI_MEMORY/CONFIG.md
          printf '\n## 2026-01-01\n' >> /tmp/proj/AI_MEMORY/SYNC_LOG.md
          for i in $(seq 1 16); do printf -- '- [10:%02d] [Claude] [TASKS.md] bullet %d\n' "$i" "$i" >> /tmp/proj/AI_MEMORY/SYNC_LOG.md; done
          mkdir /tmp/proj/AI_MEMORY/.write.lock
          if bash /tmp/proj/scripts/check_memory.sh; then
            echo "lint failed to catch injected violations" && exit 1
          else
            echo "all injected violations caught"
          fi

      - name: SVG assets are valid XML
        run: |
          python3 - << 'EOF'
          import xml.dom.minidom, glob
          for f in glob.glob('assets/*.svg'):
              xml.dom.minidom.parse(f)
              print('valid:', f)
          EOF
