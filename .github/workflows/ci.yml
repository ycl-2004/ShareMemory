name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Protocol lint self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax check
        run: bash -n templates/project/scripts/check_memory.sh

      - name: Template smoke test
        run: |
          make_project() {
            mkdir -p /tmp/proj/scripts /tmp/proj/AI_MEMORY/archive
            cp templates/project/AGENTS.md /tmp/proj/AGENTS.md
            cp templates/project/CLAUDE.md /tmp/proj/CLAUDE.md
            cp templates/project/MEMORY_PROTOCOL.md /tmp/proj/MEMORY_PROTOCOL.md
            cp templates/project/scripts/check_memory.sh /tmp/proj/scripts/check_memory.sh
            chmod +x /tmp/proj/scripts/check_memory.sh
            cp templates/memory/*.md /tmp/proj/AI_MEMORY/
          }

          make_project
          bash /tmp/proj/scripts/check_memory.sh

          printf '\n<!-- SHAREMEMORY:START -->\nextra\n<!-- SHAREMEMORY:END -->\n' >> /tmp/proj/AGENTS.md
          if bash /tmp/proj/scripts/check_memory.sh; then
            echo "lint failed to catch duplicate marker" && exit 1
          fi

      - name: SVG assets are valid XML
        run: |
          python3 - << 'EOF'
          import xml.dom.minidom, glob
          for f in glob.glob('assets/*.svg'):
              xml.dom.minidom.parse(f)
              print('valid:', f)
          EOF
